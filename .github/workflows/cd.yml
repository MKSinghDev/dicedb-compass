name: Tauri CD

on:
    push:
        branches: [trunk]
    pull_request:
        branches: [trunk]

env:
    CARGO_TERM_COLOR: always

jobs:
    build:
        name: Build
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  profile: minimal
                  override: true

            - name: Install system dependencies (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev

            - name: Install dependencies
              run: bun install

            - name: Build application
              run: bun run build

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.os }}-${{ github.sha }}
                  path: |
                      src-tauri/target/release/bundle/
                      src-tauri/target/release/*.deb
                      src-tauri/target/release/*.msi
                      src-tauri/target/release/*.dmg
                  if-no-files-found: error
                  retention-days: 5

    release:
        name: Create Release
        needs: build
        if: github.ref == 'refs/heads/trunk'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create release
              uses: softprops/action-gh-release@v1
              with:
                  name: Release v${{ github.ref_name }}
                  body: |
                      Automated release for commit ${{ github.sha }}

                      **Downloads:**
                      - Linux (.deb)
                      - Windows (.msi)
                      - macOS (.dmg)
                  draft: false
                  prerelease: false
                  files: |
                      artifacts/release-ubuntu-latest-${{ github.sha }}/*.deb
                      artifacts/release-windows-latest-${{ github.sha }}/*.msi
                      artifacts/release-macos-latest-${{ github.sha }}/*.dmg
